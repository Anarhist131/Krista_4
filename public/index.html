<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>Криста 8</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0b10">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e1e1e1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app {
      width: 100%; max-width: 450px; height: 100vh; max-height: 750px;  /* стало компактнее */
      background: #111116; border-radius: 28px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8);
      overflow: hidden; display: flex; flex-direction: column;
    }
    /* Шапка – уменьшена */
    .top-header {
      background: #16161b; padding: 8px 16px;
      font-size: 20px; font-weight: bold; color: #fff;
      text-align: center; border-bottom: 1px solid #2a2a30;
      flex-shrink: 0;
    }
    .screens-container {
      flex: 1; overflow-y: auto; position: relative;
    }
    .screen {
      display: none; padding: 14px 14px 80px; min-height: 100%;
    }
    .screen.active { display: block; }
    /* Экран музыки – гибкий */
    #musicScreen.screen {
      padding-bottom: 0;
      display: none;
      flex-direction: column;
    }
    #musicScreen.screen.active {
      display: flex;
    }

    /* Нижняя панель – уменьшена */
    .bottom-nav {
      height: 60px; background: #16161b; border-top: 1px solid #2a2a30;
      display: flex; justify-content: space-around; align-items: center;
      padding: 0 10px 6px; flex-shrink: 0; backdrop-filter: blur(10px);
    }
    .nav-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: #202028; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #999; cursor: pointer; transition: 0.2s;
    }
    .nav-btn.active { background: #6c5ce7; color: #fff; box-shadow: 0 4px 12px rgba(108,92,231,0.5); }

    .header-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .header-bar input {
      flex: 1; background: #1e1e26; border: 1px solid #2c2c34;
      border-radius: 20px; padding: 10px 14px; color: #e1e1e1;
      outline: none; font-size: 14px;
    }
    .icon-circle {
      width: 40px; height: 40px; border-radius: 50%;
      background: #1e1e26; border: 1px solid #2c2c34;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #ccc; cursor: pointer; flex-shrink: 0;
    }
    .empty-feed {
      background: #1a1a22; border-radius: 20px; padding: 28px 20px;
      text-align: center; color: #777; font-size: 15px; line-height: 1.5;
      margin-top: 16px;
    }

    .chat-list .chat-item {
      display: flex; align-items: center; padding: 12px;
      border-bottom: 1px solid #1e1e26; gap: 12px; cursor: pointer;
    }
    .chat-item .avatar, .message .avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: #2a2a35; display: flex; align-items: center; justify-content: center;
      font-weight: bold; color: #6c5ce7; font-size: 18px;
      background-size: cover; background-position: center;
    }
    .chat-info { flex: 1; }
    .chat-info .name { font-size: 15px; font-weight: 500; }
    .chat-info .last-msg { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-room { display: flex; flex-direction: column; height: 100%; }
    .chat-room-header {
      background: #1a1a22; padding: 8px 14px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #2c2c30;
    }
    .back-btn { background: none; border: none; color: #6c5ce7; font-size: 20px; cursor: pointer; }
    .chat-room-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      background: #0f0f15;
    }
    .message {
      background: #1e1e2a; border-radius: 12px 12px 12px 2px;
      padding: 8px 12px; max-width: 85%; align-self: flex-start;
      font-size: 14px; line-height: 1.4; color: #e1e1e1;
      position: relative; word-break: break-word;
    }
    .message.self {
      align-self: flex-end; background: #2b2b4f; border-radius: 12px 12px 2px 12px;
    }
    .message .sender { font-weight: bold; color: #7aa2f7; margin-bottom: 4px; display: block; font-size: 12px; }
    .message .time { font-size: 10px; color: #6c7883; margin-top: 4px; text-align: right; }
    .msg-menu {
      position: absolute; top: 100%; right: 0; background: #2c2c3a; border-radius: 8px;
      padding: 4px 0; display: none; z-index: 10; min-width: 100px;
    }
    .msg-menu button {
      display: block; width: 100%; background: none; border: none; padding: 8px 16px;
      color: #e1e1e1; text-align: left; cursor: pointer; font-size: 13px;
    }
    .chat-room-input {
      padding: 8px; display: flex; gap: 8px; background: #1a1a22; border-top: 1px solid #2c2c30;
    }
    .chat-room-input input {
      flex: 1; background: #25252e; border: none; border-radius: 20px; padding: 10px 14px;
      color: #e1e1e1; outline: none;
    }

    /* Музыка – только список и нижняя панель */
    .music-actions {
      display: flex; gap: 8px; margin-bottom: 14px; flex-shrink: 0;
    }
    .music-actions button {
      background: #1e1e26; border: 1px solid #2c2c34;
      border-radius: 12px; padding: 10px 14px; color: #e1e1e1; font-size: 13px; cursor: pointer;
    }
    .music-content { flex: 1; overflow-y: auto; margin-bottom: 8px; }
    .track-list { margin-bottom: 12px; }
    .track-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #2a2a30; cursor: pointer;
    }
    .music-controls {
      display: flex; justify-content: center; align-items: center; gap: 16px;
      padding: 12px 0; border-top: 1px solid #2a2a30; flex-shrink: 0;
    }
    .ctrl-btn {
      background: #25252e; border: none; border-radius: 50%;
      width: 44px; height: 44px; font-size: 20px; color: #e1e1e1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn.play { background: #6c5ce7; }

    /* Модальные окна общие */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); display: none; align-items: center;
      justify-content: center; z-index: 100;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #1e1e26; border-radius: 16px; padding: 18px;
      width: 90%; max-width: 300px; color: #e1e1e1; position: relative;
      text-align: center;
    }
    .modal .close-btn {
      position: absolute; top: 8px; right: 12px;
      background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer;
    }
    .modal h3 { margin-bottom: 16px; font-size: 18px; }
    .modal button {
      width: 100%; background: #6c5ce7; border: none; border-radius: 10px;
      padding: 12px; color: #fff; font-size: 14px; cursor: pointer; margin-top: 8px;
    }
    .modal .secondary-btn {
      background: #2a2a35; color: #ccc; margin-top: 10px;
    }
    .modal .hint { font-size: 12px; color: #888; margin: 8px 0; }

    /* Профиль */
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: #6c5ce7; margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: #fff; background-size: cover; background-position: center;
    }
    .profile-name { text-align: center; font-size: 18px; margin-bottom: 4px; }
    .profile-uin { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 16px; }

    .search-results {
      background: #1a1a22; border-radius: 12px; margin-top: 8px;
      overflow: hidden; display: none;
    }
    .search-results.visible { display: block; }
    .search-item {
      padding: 12px 16px; border-bottom: 1px solid #2a2a30; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
    }

    /* --- НАСТРОЙКИ --- */
    .settings-block { margin-bottom: 20px; }
    .settings-block label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .settings-block input, .settings-block .info-text {
      width: 100%; background: #1e1e26; border: 1px solid #2c2c34;
      border-radius: 10px; padding: 10px; color: #e1e1e1; font-size: 14px; outline: none;
    }
    .avatar-upload { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .avatar-upload img {
      width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: #2a2a35;
    }
    .about-section {
      margin-top: 24px; border-top: 1px solid #2a2a30; padding-top: 18px;
    }
    .about-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .about-item span:last-child { color: #aaa; }
    .btn-danger {
      width: 100%; background: #2d1f2d; border: 1px solid #b71c1c;
      color: #f7768e; border-radius: 12px; padding: 12px; font-size: 15px;
      margin-top: 16px; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top-header">Криста 8</div>
  <div class="screens-container">
    <!-- Лента -->
    <div id="feedScreen" class="screen active">
      <div class="header-bar">
        <input type="text" id="searchInput" placeholder="Поиск по аккаунтам, чатам...">
        <div class="icon-circle" id="createBtn" title="Создать">✏️</div>
      </div>
      <div class="search-results" id="searchResults"></div>
      <div id="feedContent">
        <div class="empty-feed" id="feedPlaceholder">Вы не подписаны ни на один канал/чат,<br>либо нет никаких сообщений.</div>
      </div>
    </div>

    <!-- Сообщения (чаты) -->
    <div id="chatsScreen" class="screen">
      <div id="chatListContainer">
        <div style="font-size:18px; font-weight:bold; margin-bottom:12px;">💬 Чаты</div>
        <div class="chat-list" id="chatList"></div>
      </div>
      <div id="chatRoomContainer" style="display:none; height:100%; flex-direction:column;">
        <div class="chat-room">
          <div class="chat-room-header">
            <button class="back-btn" id="backToChatList">←</button>
            <div class="avatar small" id="chatRoomAvatar">#</div>
            <div>
              <div id="chatRoomName" style="font-weight:500;">Название</div>
              <div id="chatRoomStatus" style="font-size:12px;color:#888;"></div>
            </div>
          </div>
          <div class="chat-room-messages" id="chatMessages"></div>
          <div class="chat-room-input">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendBtn" class="icon-circle" style="width:38px;height:38px;">➤</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Музыка (без плейлистов) -->
    <div id="musicScreen" class="screen">
      <div style="font-size:18px; font-weight:bold; margin-bottom:10px; flex-shrink:0;">🎵 Музыка</div>
      <div class="music-actions" style="flex-shrink:0;">
        <button id="uploadTrackBtn">Выложить трек</button>
      </div>
      <div class="music-content" id="musicContent">
        <div class="empty-feed">🎧 Загрузка треков...</div>
      </div>
      <div class="music-controls" style="flex-shrink:0;">
        <button class="ctrl-btn" id="rewindBack">⏪</button>
        <button class="ctrl-btn" id="prevTrack">⏮</button>
        <button class="ctrl-btn play" id="playPauseBtn">▶️</button>
        <button class="ctrl-btn" id="nextTrack">⏭</button>
        <button class="ctrl-btn" id="rewindForward">⏩</button>
      </div>
    </div>

    <!-- Настройки -->
    <div id="settingsScreen" class="screen">
      <div style="font-size:18px; font-weight:bold; margin-bottom:12px;">⚙️ Настройки</div>
      <div class="settings-block"><label>Ваш UIN</label><div class="info-text" id="uinDisplay">------</div></div>
      <div class="settings-block"><label>Никнейм</label><input type="text" id="nicknameInput"></div>
      <div class="settings-block"><label>Аватар</label>
        <div class="avatar-upload">
          <img id="avatarPreview" src="" alt="Аватар">
          <input type="file" id="avatarInput" accept="image/*" hidden>
          <button id="uploadAvatarBtn" class="icon-circle" style="width:auto; border-radius:10px; padding:0 12px;">Загрузить</button>
        </div>
      </div>
      <button class="btn-danger" id="logoutBtn">🚪 Выйти из аккаунта</button>
      <button class="btn-danger" id="deleteAccountBtn" style="background:#3d1f1f;border-color:#b71c1c;">🗑 Удалить аккаунт</button>
      <div class="about-section">
        <h4>О Криста</h4>
        <div class="about-item"><span>Версия</span><span>8.0.0</span></div>
        <div class="about-item"><span>Компания</span><span>ЛесГем Company</span></div>
        <div class="about-item"><span>Автор</span><span>Кухарев Егор</span></div>
        <div class="about-item"><span>Сайт</span><span>k-message.tb.ru</span></div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" data-screen="feedScreen">🏠</button>
    <button class="nav-btn" data-screen="chatsScreen">💬</button>
    <button class="nav-btn" data-screen="musicScreen">🎵</button>
    <button class="nav-btn" data-screen="settingsScreen">⚙️</button>
  </div>
</div>

<!-- Модальное окно: Выложить трек -->
<div class="modal-overlay" id="uploadTrackModal">
  <div class="modal">
    <button class="close-btn" id="closeUploadTrackModal">✕</button>
    <h3>Выложить трек</h3>
    <button id="selectTrackFileBtn">Загрузить трек</button>
    <div class="hint">Только OGG</div>
    <a href="https://convertio.co/ru/mp3-ogg/" target="_blank" rel="noopener">
      <button class="secondary-btn">Перевести MP3 в OGG</button>
    </a>
  </div>
</div>

<!-- Модальное окно: Профиль пользователя -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <button class="close-btn" id="closeProfileModal">✕</button>
    <div class="profile-avatar" id="profileAvatarImg">👤</div>
    <div class="profile-name" id="profileName"></div>
    <div class="profile-uin" id="profileUin"></div>
    <button id="profileSendMsgBtn">💬 Написать</button>
  </div>
</div>

<!-- Модальное окно: Авторизация -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <h3 id="authTitle">Вход</h3>
    <input class="info-text" type="text" id="authLogin" placeholder="UIN" style="margin-bottom:10px;">
    <input class="info-text" type="password" id="authPassword" placeholder="Пароль" style="margin-bottom:10px;">
    <input class="info-text" type="text" id="authNick" placeholder="Никнейм" style="display:none;margin-bottom:10px;">
    <button id="authSubmitBtn">Войти</button>
    <button id="toggleAuthMode" style="background:#2a2a35;color:#ccc;">Регистрация</button>
    <div id="authError" style="color:#f7768e;margin-top:8px;"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
const socket = io();
let currentUser = null;
let currentRoomId = null;

// ========== DOM ЭЛЕМЕНТЫ ==========
const screens = document.querySelectorAll('.screen');
const navButtons = document.querySelectorAll('.nav-btn');
const feedContent = document.getElementById('feedContent');
const feedPlaceholder = document.getElementById('feedPlaceholder');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const chatList = document.getElementById('chatList');
const chatListContainer = document.getElementById('chatListContainer');
const chatRoomContainer = document.getElementById('chatRoomContainer');
const chatRoomName = document.getElementById('chatRoomName');
const chatRoomStatus = document.getElementById('chatRoomStatus');
const chatRoomAvatar = document.getElementById('chatRoomAvatar');
const chatMessages = document.getElementById('chatMessages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const backToChatList = document.getElementById('backToChatList');
const uploadTrackBtn = document.getElementById('uploadTrackBtn');
const uploadTrackModal = document.getElementById('uploadTrackModal');
const closeUploadTrackModal = document.getElementById('closeUploadTrackModal');
const selectTrackFileBtn = document.getElementById('selectTrackFileBtn');
const musicContent = document.getElementById('musicContent');
const playPauseBtn = document.getElementById('playPauseBtn');
const rewindBack = document.getElementById('rewindBack');
const rewindForward = document.getElementById('rewindForward');
const avatarPreview = document.getElementById('avatarPreview');
const avatarInput = document.getElementById('avatarInput');
const uploadAvatarBtn = document.getElementById('uploadAvatarBtn');
const logoutBtn = document.getElementById('logoutBtn');

// ========== НАВИГАЦИЯ ==========
navButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.screen;
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(target).classList.add('active');
    navButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (target === 'feedScreen') loadFeed();
    else if (target === 'chatsScreen') loadChatList();
    else if (target === 'musicScreen') loadAllTracks();
  });
});

// ========== АВТОРИЗАЦИЯ (не меняем) ==========
let authMode = 'login';
const authModal = document.getElementById('authModal');
const authTitle = document.getElementById('authTitle');
const authLogin = document.getElementById('authLogin');
const authPassword = document.getElementById('authPassword');
const authNick = document.getElementById('authNick');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const toggleAuthBtn = document.getElementById('toggleAuthMode');
const authError = document.getElementById('authError');
const token = localStorage.getItem('k8_token');

function setAuthMode(mode) {
  authMode = mode;
  if (mode === 'login') {
    authTitle.textContent = 'Вход';
    authSubmitBtn.textContent = 'Войти';
    authLogin.style.display = '';
    authNick.style.display = 'none';
    toggleAuthBtn.textContent = 'Регистрация';
  } else {
    authTitle.textContent = 'Регистрация';
    authSubmitBtn.textContent = 'Создать аккаунт';
    authLogin.style.display = 'none';
    authNick.style.display = '';
    toggleAuthBtn.textContent = 'Вход';
  }
}

if (token) {
  socket.emit('loginByToken', token);
} else {
  authModal.classList.add('visible');
}

toggleAuthBtn.addEventListener('click', () => setAuthMode(authMode === 'login' ? 'register' : 'login'));
authSubmitBtn.addEventListener('click', () => {
  const password = authPassword.value;
  const nick = authNick.value.trim();
  if (!password) { authError.textContent = 'Введите пароль'; return; }
  if (authMode === 'register') {
    if (!nick) { authError.textContent = 'Введите никнейм'; return; }
    socket.emit('register', { password, nick });
  } else {
    const login = authLogin.value.trim();
    if (!login) { authError.textContent = 'Введите UIN'; return; }
    socket.emit('login', { login, password });
  }
});

socket.on('authError', msg => { authError.textContent = msg; });
socket.on('authSuccess', profile => {
  currentUser = profile;
  localStorage.setItem('k8_token', profile.token);
  authModal.classList.remove('visible');
  document.getElementById('feedScreen').classList.add('active');
  document.getElementById('uinDisplay').textContent = profile.uin;
  document.getElementById('nicknameInput').value = profile.nick;
  loadFeed();
  loadChatList();
});
socket.on('tokenLoginResult', res => {
  if (res.success) {
    currentUser = res.profile;
    document.getElementById('uinDisplay').textContent = res.profile.uin;
    document.getElementById('nicknameInput').value = res.profile.nick;
    document.getElementById('feedScreen').classList.add('active');
    loadFeed();
    loadChatList();
  } else {
    localStorage.removeItem('k8_token');
    authModal.classList.add('visible');
  }
});

// ========== КНОПКА "КАРАНДАШ" (СОЗДАТЬ) ==========
document.getElementById('createBtn').addEventListener('click', () => {
  const name = prompt('Название чата или канала:');
  if (!name) return;
  const type = confirm('Нажмите "ОК" для канала, "Отмена" для чата.') ? 'channel' : 'chat';
  socket.emit('createRoom', { name, type });
});

// ========== ЛЕНТА ==========
function loadFeed() {
  if (!currentUser) return;
  socket.emit('getFeed');
}
socket.on('feed', messages => {
  if (!messages.length) {
    feedPlaceholder.style.display = 'block';
    return;
  }
  feedPlaceholder.style.display = 'none';
  let html = '';
  messages.forEach(msg => {
    const roomName = msg.roomName || 'Чат';
    html += `<div class="chat-item" style="cursor:default;">
      <div class="avatar">${msg.user ? msg.user[0] : '?'}</div>
      <div class="chat-info">
        <div class="name">${escapeHtml(msg.user)} <span style="font-size:12px;color:#888;">в ${escapeHtml(roomName)}</span></div>
        <div class="last-msg">${escapeHtml(msg.text)}</div>
      </div>
    </div>`;
  });
  feedContent.innerHTML = html;
});

// ========== ПОИСК ==========
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { searchResults.classList.remove('visible'); return; }
  socket.emit('globalSearch', { query: q });
});
socket.on('searchResults', results => {
  if (!results.length) {
    searchResults.innerHTML = '<div class="search-item" style="color:#888;">Ничего не найдено</div>';
    searchResults.classList.add('visible');
    return;
  }
  searchResults.innerHTML = results.map(item => {
    if (item.type === 'user') {
      return `<div class="search-item" data-type="user" data-uin="${item.uin}" data-nick="${escapeHtml(item.nick)}">
        <div class="avatar">${item.nick[0]}</div>
        <div class="chat-info"><div class="name">${escapeHtml(item.nick)}</div><div class="last-msg">UIN: ${item.uin}</div></div>
      </div>`;
    } else {
      return `<div class="search-item" data-type="room" data-id="${item.id}" data-name="${escapeHtml(item.name)}">
        <div class="avatar">${item.type==='channel'?'📢':'#'}</div>
        <div class="chat-info"><div class="name">${escapeHtml(item.name)}</div><div class="last-msg">${item.type}</div></div>
      </div>`;
    }
  }).join('');
  searchResults.classList.add('visible');
});

// ========== ПРОФИЛЬ (из поиска / чата) ==========
function showProfile(uin, nick) {
  document.getElementById('profileName').textContent = nick;
  document.getElementById('profileUin').textContent = 'UIN: ' + uin;
  document.getElementById('profileAvatarImg').textContent = nick[0];
  document.getElementById('profileModal').classList.add('visible');
  document.getElementById('profileSendMsgBtn').onclick = () => {
    socket.emit('startPrivateChat', uin);
    document.getElementById('profileModal').classList.remove('visible');
  };
}
document.getElementById('closeProfileModal').addEventListener('click', () => {
  document.getElementById('profileModal').classList.remove('visible');
});

// ========== ЧАТЫ ==========
function loadChatList() {
  if (!currentUser) return;
  socket.emit('getMainList');
}
socket.on('mainList', ({ rooms, contacts }) => {
  let html = '';
  rooms.forEach(r => {
    html += `<div class="chat-item" data-room="${r.id}" data-name="${escapeHtml(r.name)}" data-type="${r.type}">
      <div class="avatar">${r.type==='channel'?'📢':'#'}</div>
      <div class="chat-info"><div class="name">${escapeHtml(r.name)}</div><div class="last-msg">${r.type}</div></div>
    </div>`;
  });
  contacts.forEach(c => {
    html += `<div class="chat-item" data-contact="${c.id}" data-nick="${escapeHtml(c.nick)}">
      <div class="avatar">${c.nick[0]}</div>
      <div class="chat-info"><div class="name">${escapeHtml(c.nick)}</div><div class="last-msg">${c.online ? 'В сети' : 'Не в сети'}</div></div>
    </div>`;
  });
  chatList.innerHTML = html || '<div style="color:#888;">Нет чатов</div>';
  attachChatListListeners();
});

function attachChatListListeners() {
  document.querySelectorAll('.chat-item[data-room]').forEach(el => {
    el.addEventListener('click', () => openRoom(el.dataset.room, el.dataset.name, el.dataset.type));
  });
  document.querySelectorAll('.chat-item[data-contact]').forEach(el => {
    el.addEventListener('click', () => {
      socket.emit('startPrivateChat', el.dataset.contact);
    });
  });
}

function openRoom(roomId, name, type) {
  currentRoomId = roomId;
  chatRoomName.textContent = name;
  chatRoomStatus.textContent = type === 'channel' ? 'Канал' : 'Чат';
  chatRoomAvatar.textContent = type === 'channel' ? '📢' : '#';
  chatMessages.innerHTML = '';
  chatListContainer.style.display = 'none';
  chatRoomContainer.style.display = 'flex';
  socket.emit('joinRoom', roomId);
}

backToChatList.onclick = () => {
  chatRoomContainer.style.display = 'none';
  chatListContainer.style.display = 'block';
  currentRoomId = null;
};

// ========== ЧАТ: СООБЩЕНИЯ ==========
socket.on('roomInfo', ({ messages, participants }) => {
  messages.forEach(msg => appendMessage(msg));
  chatMessages.scrollTop = chatMessages.scrollHeight;
  if (participants) {
    const other = participants.find(p => p.uin !== currentUser.uin);
    if (other) {
      chatRoomStatus.textContent = other.online ? 'В сети' : 'Не в сети';
    }
  }
});
socket.on('newMessage', msg => {
  if (msg.userId === currentUser?.uin) return;
  appendMessage(msg);
});
socket.on('messageEdited', ({ messageId, newText }) => {
  const el = document.querySelector(`[data-id="${messageId}"] .msg-text`);
  if (el) el.textContent = newText + ' (изм.)';
});
socket.on('messageDeleted', ({ messageId }) => {
  const el = document.querySelector(`[data-id="${messageId}"] .msg-text`);
  if (el) el.textContent = 'Сообщение удалено';
});

function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = 'message' + (msg.userId === currentUser.uin ? ' self' : '');
  div.dataset.id = msg._id;
  div.innerHTML = `
    ${msg.userId !== currentUser.uin ? `<span class="sender">${escapeHtml(msg.user)}</span>` : ''}
    <span class="msg-text">${escapeHtml(msg.text)}</span>
    ${msg.fileUrl ? `<div><a href="${msg.fileUrl}" target="_blank">📎 Файл</a></div>` : ''}
    <div class="time">${msg.time || ''}</div>
  `;
  div.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (msg.userId !== currentUser.uin) return;
    showMessageMenu(e, msg._id, msg.text);
  });
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showMessageMenu(e, msgId, oldText) {
  const existing = document.querySelector('.msg-menu');
  if (existing) existing.remove();
  const menu = document.createElement('div');
  menu.className = 'msg-menu';
  menu.style.left = e.offsetX + 'px';
  menu.style.top = e.offsetY + 'px';
  menu.innerHTML = `<button id="editMsg">Редактировать</button><button id="deleteMsg">Удалить</button>`;
  e.target.closest('.message').appendChild(menu);
  menu.style.display = 'block';
  menu.querySelector('#editMsg').onclick = () => {
    const newText = prompt('Редактировать:', oldText);
    if (newText) socket.emit('editMessage', { roomId: currentRoomId, messageId: msgId, newText });
    menu.remove();
  };
  menu.querySelector('#deleteMsg').onclick = () => {
    if (confirm('Удалить сообщение?')) socket.emit('deleteMessage', { roomId: currentRoomId, messageId: msgId });
    menu.remove();
  };
  setTimeout(() => menu.remove(), 5000);
}

sendBtn.onclick = () => {
  const text = messageInput.value.trim();
  if (!text || !currentRoomId) return;
  socket.emit('chatMessage', { roomId: currentRoomId, text });
  messageInput.value = '';
};

// ========== МУЗЫКА (новая логика) ==========
let currentTrack = null;

async function loadAllTracks() {
  try {
    const res = await fetch('/api/music');
    const tracks = await res.json();
    if (!tracks.length) {
      musicContent.innerHTML = '<div class="empty-feed">🎵 Нет загруженных треков</div>';
      return;
    }
    musicContent.innerHTML = '<div class="track-list">' +
      tracks.map(t => `<div class="track-item" data-url="${t.url}" data-title="${escapeHtml(t.title)}">🎵 ${escapeHtml(t.title)}</div>`).join('') +
      '</div>';
  } catch (err) {
    musicContent.innerHTML = '<div class="empty-feed">⚠ Ошибка загрузки треков</div>';
    console.error(err);
  }
}

// Открыть модальное окно "Выложить трек"
uploadTrackBtn.addEventListener('click', () => {
  uploadTrackModal.classList.add('visible');
});
closeUploadTrackModal.addEventListener('click', () => {
  uploadTrackModal.classList.remove('visible');
});

// Кнопка "Загрузить трек" в модалке — открываем выбор файла
selectTrackFileBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.ogg';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('music', file);
    form.append('title', file.name.replace(/\.ogg$/, ''));
    form.append('userId', currentUser.uin);
    await fetch('/upload/music', { method: 'POST', body: form });
    uploadTrackModal.classList.remove('visible');
    loadAllTracks();
  };
  input.click();
});

// Воспроизведение по клику на трек
musicContent.addEventListener('click', e => {
  const item = e.target.closest('.track-item');
  if (!item) return;
  const url = item.dataset.url;
  const title = item.dataset.title;
  if (currentTrack) currentTrack.pause();
  currentTrack = new Audio(url);
  currentTrack.play();
  playPauseBtn.textContent = '⏸';
});

playPauseBtn.addEventListener('click', () => {
  if (!currentTrack) return;
  if (currentTrack.paused) {
    currentTrack.play();
    playPauseBtn.textContent = '⏸';
  } else {
    currentTrack.pause();
    playPauseBtn.textContent = '▶️';
  }
});
rewindBack.addEventListener('click', () => { if (currentTrack) currentTrack.currentTime -= 5; });
rewindForward.addEventListener('click', () => { if (currentTrack) currentTrack.currentTime += 5; });

// ========== НАСТРОЙКИ ==========
uploadAvatarBtn.addEventListener('click', () => avatarInput.click());
avatarInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !currentUser) return;
  const reader = new FileReader();
  reader.onload = ev => avatarPreview.src = ev.target.result;
  reader.readAsDataURL(file);
  const form = new FormData();
  form.append('avatar', file);
  form.append('userId', currentUser.uin);
  try {
    await fetch('/upload/avatar', { method: 'POST', body: form });
  } catch (err) {
    console.error('Ошибка загрузки аватара:', err);
  }
});
logoutBtn.addEventListener('click', () => {
  localStorage.removeItem('k8_token');
  location.reload();
});

// ========== УТИЛИТЫ ==========
function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
