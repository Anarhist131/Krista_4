<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Криста 4</title>
  <style>
    :root {
      --glass-bg: rgba(15, 15, 20, 0.75);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(18px);
      --text-primary: #eaeaea;
      --text-secondary: #a0a0b0;
      --accent: #7aa2f7;
      --online: #9ece6a;
      --offline: #555;
      --radius: 18px;
      --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: #0b0b10;
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 850px;
      background: #0f0f16;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .app-bg {
      position: absolute; top:0;left:0;right:0;bottom:0;
      background: radial-gradient(circle at 30% 10%, rgba(122,162,247,0.12), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(187,154,247,0.1), transparent 40%);
      pointer-events: none;
    }
    .screen { position: relative; flex:1; display:flex; flex-direction: column; z-index:1; overflow: hidden; }
    .hidden { display: none !important; }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      border-radius: var(--radius);
    }
    /* Главный экран */
    #mainScreen { display:flex; flex-direction:column; }
    .header {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      margin: 10px 10px 0;
      border-radius: var(--radius) var(--radius) 0 0;
      gap: 12px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7aa2f7, #bb9af7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-right: auto;
    }
    .icon-btn {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-primary);
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
    .search-box {
      margin: 10px 14px;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 8px 16px;
      backdrop-filter: blur(10px);
    }
    .search-box input {
      flex:1; background: transparent; border:none; color: var(--text-primary);
      font-size: 0.95rem; outline: none;
    }
    .search-box input::placeholder { color: var(--text-secondary); }
    .list-container { flex:1; overflow-y: auto; padding: 4px 10px; }
    .list-section { margin-bottom: 8px; }
    .section-title { padding: 8px 14px 4px; font-size: 0.8rem; font-weight: 500;
      text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.5px; }
    .contact-item, .room-item {
      display:flex; align-items:center; padding: 10px 14px; margin: 2px 0;
      border-radius: 14px; cursor: pointer; transition: 0.2s;
      background: rgba(255,255,255,0.02); border: 1px solid transparent;
    }
    .contact-item:hover, .room-item:hover { background: rgba(255,255,255,0.08); border-color: var(--glass-border); }
    .avatar {
      width:40px; height:40px; border-radius:50%; background: rgba(255,255,255,0.1);
      display:flex; align-items:center; justify-content:center;
      font-weight:600; color: var(--accent); margin-right:12px; flex-shrink:0;
    }
    .info { flex:1; min-width:0; }
    .nick { font-weight:600; font-size:1rem; }
    .user-id { font-size:0.75rem; color: var(--text-secondary); margin-left:6px; }
    .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-left:8px; }
    .status-dot.online { background: var(--online); box-shadow: 0 0 8px var(--online); }
    .status-dot.offline { background: var(--offline); }
    .room-item .avatar { background: rgba(122,162,247,0.2); color:#fff; }

    /* Меню создания */
    .create-menu {
      position: absolute; top: 60px; right: 16px;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
      border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display:flex; flex-direction:column; padding:8px; z-index:10;
    }
    .create-menu button {
      background: transparent; border:none; color: var(--text-primary);
      padding: 12px 16px; text-align:left; border-radius:12px; cursor:pointer;
      font-size:0.9rem; transition:0.2s; white-space:nowrap;
    }
    .create-menu button:hover { background: rgba(255,255,255,0.1); }

    /* Модальное окно */
    .modal-dialog {
      position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 24px; width: 300px; z-index:20;
      text-align:center; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .modal-dialog input {
      width:100%; margin:12px 0; padding:10px; border-radius:30px;
      border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05);
      color:#fff; outline:none; font-size:0.9rem;
    }
    .glass-btn {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-primary); padding: 10px 16px; border-radius: 30px;
      cursor: pointer; font-weight:500; font-size:0.85rem; transition:0.2s;
    }
    .glass-btn:hover { background: var(--accent); border-color: var(--accent); color:#000; }

    /* Экран чата */
    #chatScreen { display:flex; flex-direction:column; }
    .chat-header {
      display:flex; align-items:center; padding:12px 10px; margin:10px 10px 0;
      border-radius: var(--radius) var(--radius) 0 0; gap:8px;
    }
    .back-btn { background:transparent; border:none; color: var(--accent); font-size:1.5rem; cursor:pointer; padding:0 6px; }
    .chat-header .chat-info { flex:1; cursor:pointer; }
    .chat-name { font-weight:600; font-size:1.1rem; }
    .chat-id { font-size:0.75rem; color: var(--text-secondary); }
    .messages-area { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
    .message-line { padding:6px 0; font-size:0.95rem; line-height:1.4; }
    .message-line .time { color: var(--text-secondary); margin-right:6px; }
    .message-line .sender { font-weight:600; margin-right:6px; color: var(--accent); }
    .input-area {
      display:flex; padding:10px 10px; border-top: 1px solid var(--glass-border);
      align-items:center; gap:8px;
    }
    .input-area input {
      flex:1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      border-radius:30px; padding:12px 16px; color:#fff; outline:none; font-size:0.95rem;
    }
    .input-area button {
      background: var(--accent); border:none; border-radius:50%; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      box-shadow: 0 0 8px rgba(122,162,247,0.3);
    }
    @media (max-width: 500px) { .phone-frame { max-height: 100%; border-radius: 0; } }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="app-bg"></div>

  <!-- Главный экран -->
  <div id="mainScreen" class="screen">
    <div class="header glass-panel">
      <span class="logo">Криста 4</span>
      <button class="icon-btn" id="openSettingsBtn">⚙️</button>
      <button class="icon-btn" id="createBtn">✏️</button>
      <div class="create-menu hidden" id="createMenu">
        <button id="createChatOption">📌 Создать чат</button>
        <button id="createChannelOption">📢 Создать канал</button>
        <button id="addContactOption">👤 Добавить пользователя</button>
      </div>
    </div>
    <div class="search-box">
      <input type="text" placeholder="Поиск по ID..." id="mainSearch">
      <span style="color:var(--text-secondary);">🔍</span>
    </div>
    <div class="list-container" id="contactList">
      <!-- динамическое заполнение -->
    </div>
  </div>

  <!-- Экран чата -->
  <div id="chatScreen" class="screen hidden">
    <div class="chat-header glass-panel">
      <button class="back-btn" id="backFromChat">←</button>
      <div class="chat-info" id="chatInfo">
        <div class="chat-name" id="chatNameDisplay"></div>
        <div class="chat-id" id="chatIdDisplay"></div>
      </div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
      <input type="text" placeholder="Сообщение..." id="messageInput">
      <button id="sendMessageBtn">➤</button>
    </div>
  </div>

  <!-- Модальные окна -->
  <div class="modal-dialog hidden" id="addContactDialog">
    <h3 style="margin-bottom:8px;">Добавить пользователя</h3>
    <input type="text" placeholder="Введите ID" id="newContactId">
    <button class="glass-btn" id="confirmAddContact">Добавить</button>
    <button class="glass-btn" id="cancelAddContact">Отмена</button>
  </div>
  <div class="modal-dialog hidden" id="createRoomDialog">
    <h3 style="margin-bottom:8px;" id="createRoomTitle"></h3>
    <input type="text" placeholder="Название" id="newRoomName">
    <button class="glass-btn" id="confirmCreateRoom">Создать</button>
    <button class="glass-btn" id="cancelCreateRoom">Отмена</button>
  </div>
  <div class="modal-dialog hidden" id="settingsDialog">
    <!-- заполнение динамически -->
  </div>
  <div class="modal-dialog hidden" id="userProfileDialog">
    <div id="userProfileContent"></div>
    <button class="glass-btn" id="closeProfile">Закрыть</button>
  </div>

  <!-- Авторизация -->
  <div class="modal-dialog" id="authDialog">
    <h3 style="margin-bottom:8px;" id="authTitle">Вход / Регистрация</h3>
    <input type="text" placeholder="Ваш ID" id="authLogin">
    <input type="password" placeholder="Пароль" id="authPassword">
    <input type="text" placeholder="Никнейм (новый)" id="authNick" class="hidden">
    <button class="glass-btn" id="authSubmitBtn">Войти</button>
    <button class="glass-btn" id="toggleAuthMode">Регистрация</button>
    <div id="authError" style="color:var(--danger); margin-top:8px;"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ================== ИНИЦИАЛИЗАЦИЯ ==================
const socket = io();
let currentUser = null;
let currentRoomId = null;
let currentMessages = [];
let mainListData = { onlineContacts: [], offlineContacts: [], rooms: [] };

// DOM-элементы
const mainScreen = document.getElementById('mainScreen');
const chatScreen = document.getElementById('chatScreen');
const contactList = document.getElementById('contactList');
const messagesArea = document.getElementById('messagesArea');
const chatNameDisplay = document.getElementById('chatNameDisplay');
const chatIdDisplay = document.getElementById('chatIdDisplay');
const messageInput = document.getElementById('messageInput');
const createMenu = document.getElementById('createMenu');
const authDialog = document.getElementById('authDialog');
const authTitle = document.getElementById('authTitle');
const authLogin = document.getElementById('authLogin');
const authPassword = document.getElementById('authPassword');
const authNick = document.getElementById('authNick');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const toggleAuthModeBtn = document.getElementById('toggleAuthMode');
const authError = document.getElementById('authError');

let authMode = 'login'; // 'login' или 'register'

// ================== АВТОРИЗАЦИЯ ==================
const savedToken = localStorage.getItem('k4_token');
if (savedToken) {
  authDialog.classList.add('hidden');
  socket.emit('loginByToken', savedToken);
} else {
  authDialog.classList.remove('hidden');
}

toggleAuthModeBtn.addEventListener('click', () => {
  if (authMode === 'login') {
    authMode = 'register';
    authTitle.textContent = 'Регистрация';
    authSubmitBtn.textContent = 'Создать аккаунт';
    toggleAuthModeBtn.textContent = 'Вход';
    authNick.classList.remove('hidden');
  } else {
    authMode = 'login';
    authTitle.textContent = 'Вход';
    authSubmitBtn.textContent = 'Войти';
    toggleAuthModeBtn.textContent = 'Регистрация';
    authNick.classList.add('hidden');
  }
});

authSubmitBtn.addEventListener('click', () => {
  const login = authLogin.value.trim();
  const password = authPassword.value;
  const nick = authNick.value.trim();
  authError.textContent = '';
  if (!login || !password) { authError.textContent = 'Введите ID и пароль'; return; }
  if (authMode === 'register') {
    socket.emit('register', { login, password, nick });
  } else {
    socket.emit('login', { login, password });
  }
});

socket.on('authError', (msg) => {
  authError.textContent = msg;
});

socket.on('authSuccess', (profile) => {
  currentUser = profile;
  localStorage.setItem('k4_token', profile.token);
  authDialog.classList.add('hidden');
  mainScreen.classList.remove('hidden');
  refreshMainList();
});

socket.on('tokenLoginResult', (res) => {
  if (res.success) {
    currentUser = res.profile;
    authDialog.classList.add('hidden');
    mainScreen.classList.remove('hidden');
    refreshMainList();
  } else {
    localStorage.removeItem('k4_token');
    authDialog.classList.remove('hidden');
  }
});

// ================== ГЛАВНЫЙ ЭКРАН ==================
function refreshMainList() {
  socket.emit('getMainList');
}
socket.on('mainList', (data) => {
  mainListData = data;
  renderContactList();
});
function renderContactList() {
  let html = '';
  if (mainListData.onlineContacts.length > 0) {
    html += '<div class="list-section"><div class="section-title">В сети</div>';
    mainListData.onlineContacts.forEach(c => {
      html += `<div class="contact-item" data-chat="${c.nick}" data-id="${c.id}">
        <div class="avatar">${(c.nick[0]||'').toUpperCase()}</div>
        <div class="info"><span class="nick">${c.nick}</span><span class="user-id">${c.id}</span></div>
        <div class="status-dot online"></div></div>`;
    });
    html += '</div>';
  }
  if (mainListData.offlineContacts.length > 0) {
    html += '<div class="list-section"><div class="section-title">Не в сети</div>';
    mainListData.offlineContacts.forEach(c => {
      html += `<div class="contact-item" data-chat="${c.nick}" data-id="${c.id}">
        <div class="avatar">${(c.nick[0]||'').toUpperCase()}</div>
        <div class="info"><span class="nick">${c.nick}</span><span class="user-id">${c.id}</span></div>
        <div class="status-dot offline"></div></div>`;
    });
    html += '</div>';
  }
  if (mainListData.rooms.length > 0) {
    html += '<div class="list-section"><div class="section-title">Чаты и каналы</div>';
    mainListData.rooms.forEach(r => {
      html += `<div class="room-item" data-chat="${r.name}" data-id="${r.id}">
        <div class="avatar">#</div>
        <div class="info"><span class="nick">${r.name}</span><span class="user-id">[${r.id}]</span></div></div>`;
    });
    html += '</div>';
  }
  contactList.innerHTML = html;
  attachChatListeners();
}
function attachChatListeners() {
  document.querySelectorAll('.contact-item, .room-item').forEach(el => {
    el.removeEventListener('click', openChatHandler);
    el.addEventListener('click', openChatHandler);
  });
}
function openChatHandler(e) {
  const name = e.currentTarget.dataset.chat;
  const id = e.currentTarget.dataset.id;
  openChat(name, id);
}
function openChat(name, id) {
  chatNameDisplay.textContent = name;
  chatIdDisplay.textContent = id;
  messagesArea.innerHTML = '';
  currentRoomId = id;
  socket.emit('joinRoom', id);
  mainScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  messageInput.focus();
}

// ================== ЧАТ ==================
socket.on('roomInfo', (info) => {
  currentMessages = info.messages || [];
  renderMessages();
});
socket.on('newMessage', (msg) => {
  currentMessages.push(msg);
  appendMessage(msg);
  messagesArea.scrollTop = messagesArea.scrollHeight;
});
socket.on('userJoined', (user) => console.log('+ user', user.nick));
socket.on('userLeft', (userId) => console.log('- user', userId));

function renderMessages() {
  messagesArea.innerHTML = '';
  currentMessages.forEach(appendMessage);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}
function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = 'message-line';
  div.innerHTML = `<span class="time">${msg.time}.</span><span class="sender" style="color:${msg.color || '#7aa2f7'}">${msg.user}:</span> ${msg.text}`;
  messagesArea.appendChild(div);
}

document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || !currentRoomId) return;
  socket.emit('chatMessage', { roomId: currentRoomId, text });
  messageInput.value = '';
}

document.getElementById('backFromChat').addEventListener('click', () => {
  socket.emit('leaveRoom', currentRoomId);
  chatScreen.classList.add('hidden');
  mainScreen.classList.remove('hidden');
  refreshMainList();
});

// ================== МЕНЮ СОЗДАНИЯ ==================
document.getElementById('createBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  createMenu.classList.toggle('hidden');
});
document.addEventListener('click', (e) => {
  if (!createMenu.contains(e.target)) createMenu.classList.add('hidden');
});

document.getElementById('createChatOption').addEventListener('click', () => {
  createMenu.classList.add('hidden');
  openCreateRoomDialog('chat');
});
document.getElementById('createChannelOption').addEventListener('click', () => {
  createMenu.classList.add('hidden');
  openCreateRoomDialog('channel');
});
function openCreateRoomDialog(type) {
  document.getElementById('createRoomTitle').textContent = type === 'chat' ? 'Создать чат' : 'Создать канал';
  document.getElementById('createRoomDialog').classList.remove('hidden');
  document.getElementById('newRoomName').value = '';
  document.getElementById('confirmCreateRoom').onclick = () => {
    const name = document.getElementById('newRoomName').value.trim();
    if (!name) return;
    socket.emit('createRoom', { name, type });
    document.getElementById('createRoomDialog').classList.add('hidden');
  };
}
document.getElementById('cancelCreateRoom').addEventListener('click', () => {
  document.getElementById('createRoomDialog').classList.add('hidden');
});

document.getElementById('addContactOption').addEventListener('click', () => {
  createMenu.classList.add('hidden');
  document.getElementById('addContactDialog').classList.remove('hidden');
  document.getElementById('newContactId').value = '';
});
document.getElementById('confirmAddContact').addEventListener('click', () => {
  const id = document.getElementById('newContactId').value.trim();
  if (!id) return;
  socket.emit('addContact', id);
  document.getElementById('addContactDialog').classList.add('hidden');
});
document.getElementById('cancelAddContact').addEventListener('click', () => {
  document.getElementById('addContactDialog').classList.add('hidden');
});

// ================== НАСТРОЙКИ ==================
document.getElementById('openSettingsBtn').addEventListener('click', () => {
  // наполним диалог
  const d = document.getElementById('settingsDialog');
  d.innerHTML = `
    <h3>Настройки</h3>
    <input type="text" id="setNick" placeholder="Ник" value="${currentUser?.nick || ''}">
    <input type="text" id="setDesc" placeholder="Описание" value="${currentUser?.description || ''}">
    <select id="setTheme"><option value="dark">Тёмная</option><option value="light">Светлая</option></select>
    <input type="file" id="setAvatar" accept="image/*">
    <button class="glass-btn" id="saveSettings">Сохранить</button>
    <button class="glass-btn" id="closeSettings">Отмена</button>
  `;
  d.classList.remove('hidden');
  document.getElementById('setTheme').value = currentUser?.theme || 'dark';
  document.getElementById('closeSettings').addEventListener('click', () => d.classList.add('hidden'));
  document.getElementById('saveSettings').addEventListener('click', async () => {
    const nick = document.getElementById('setNick').value.trim();
    const desc = document.getElementById('setDesc').value.trim();
    const theme = document.getElementById('setTheme').value;
    const file = document.getElementById('setAvatar').files[0];
    if (file) {
      const formData = new FormData();
      formData.append('avatar', file);
      formData.append('userId', currentUser.id);
      await fetch('/upload/avatar', { method: 'POST', body: formData });
    }
    socket.emit('updateProfile', { nick, description: desc, theme });
    d.classList.add('hidden');
  });
});

// Обновление профиля
socket.on('profileUpdated', (profile) => { currentUser = profile; });

// ================== ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ ==================
document.getElementById('chatInfo').addEventListener('click', () => {
  socket.emit('getUserProfile', currentRoomId);
});
socket.on('userProfile', (profile) => {
  const d = document.getElementById('userProfileDialog');
  document.getElementById('userProfileContent').innerHTML = `
    <img src="${profile.avatar ? '/avatars/' + profile.avatar : ''}" style="width:60px;height:60px;border-radius:50%;">
    <h3>${profile.nick}</h3>
    <p>${profile.description || ''}</p>
    <p style="color:var(--text-secondary);">Последний вход: ${new Date(profile.lastSeen).toLocaleString()}</p>
  `;
  d.classList.remove('hidden');
});
document.getElementById('closeProfile').addEventListener('click', () => {
  document.getElementById('userProfileDialog').classList.add('hidden');
});

// Поиск на главном экране
document.getElementById('mainSearch').addEventListener('input', (e) => {
  const query = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.contact-item, .room-item').forEach(el => {
    const id = el.dataset.id || '';
    el.style.display = id.includes(query) ? '' : 'none';
  });
});

// ================== КОМНАТЫ И КОНТАКТЫ ==================
socket.on('contactsUpdated', () => refreshMainList());
socket.on('subscribed', () => refreshMainList());
