<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>Криста 5</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0b10">
  <style>
    :root {
      --glass-bg: rgba(15, 15, 20, 0.75);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(18px);
      --text-primary: #eaeaea;
      --text-secondary: #a0a0b0;
      --accent: #7aa2f7;
      --online: #9ece6a;
      --offline: #555;
      --radius: 50px; /* более овальные панели */
      --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
      --danger: #f7768e;
      --status-bar-height: 24px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: #0b0b10;
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
    }
    .phone-frame {
      width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
      background: #0f0f16; border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }
    /* Анимированный фон */
    .app-bg {
      position: absolute; top:0;left:0;right:0;bottom:0;
      background: radial-gradient(circle at 30% 10%, rgba(122,162,247,0.12), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(187,154,247,0.1), transparent 40%);
      pointer-events: none;
      animation: bgMove 20s ease-in-out infinite alternate;
    }
    @keyframes bgMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }
    .screen { position: relative; flex:1; display:flex; flex-direction: column; z-index:1; overflow: hidden; }
    .hidden { display: none !important; }
    .glass-panel {
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); border-radius: var(--radius);
    }
    #mainScreen { display:flex; flex-direction:column; }
    .header {
      padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--glass-border); margin: 10px 10px 0;
      border-radius: var(--radius) var(--radius) 0 0; gap: 12px;
    }
    .logo {
      font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, #7aa2f7, #bb9af7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.5px; margin-right: auto;
    }
    .icon-btn {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-primary); width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
      justify-content: center; transition: 0.2s; flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
    .list-container { flex:1; overflow-y: auto; padding: 4px 10px; }
    .list-section { margin-bottom: 8px; }
    .section-title { padding: 8px 14px 4px; font-size: 0.8rem; font-weight: 500;
      text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.5px; }
    .contact-item, .room-item {
      display:flex; align-items:center; padding: 10px 14px; margin: 2px 0;
      border-radius: 14px; cursor: pointer; transition: 0.2s;
      background: rgba(255,255,255,0.02); border: 1px solid transparent;
      position: relative;
    }
    .contact-item:hover, .room-item:hover { background: rgba(255,255,255,0.08); border-color: var(--glass-border); }
    .avatar {
      width:40px; height:40px; border-radius:50%; background: rgba(255,255,255,0.1);
      display:flex; align-items:center; justify-content:center;
      font-weight:600; color: var(--accent); margin-right:12px; flex-shrink:0;
    }
    .info { flex:1; min-width:0; }
    .nick { font-weight:600; font-size:1rem; }
    .user-id { font-size:0.75rem; color: var(--text-secondary); margin-left:6px; }
    .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-left:8px; }
    .status-dot.online { background: var(--online); box-shadow: 0 0 8px var(--online); }
    .status-dot.offline { background: var(--offline); }
    .delete-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: transparent; border: none; color: var(--danger); font-size:1rem;
      cursor: pointer; padding: 4px; display: none;
    }
    .room-item:hover .delete-btn { display: block; }

    .create-menu {
      position: absolute; top: 60px; right: 16px;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
      border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display:flex; flex-direction:column; padding:8px; z-index:50;
    }
    .create-menu button {
      background: transparent; border:none; color: var(--text-primary);
      padding: 12px 16px; text-align:left; border-radius:12px; cursor:pointer;
      font-size:0.9rem; transition:0.2s; white-space:nowrap;
    }
    .create-menu button:hover { background: rgba(255,255,255,0.1); }

    /* Контекстное меню для копирования */
    .context-popup {
      position: fixed;
      background: rgba(20,20,30,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 8px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }
    .context-popup button {
      background: transparent;
      border: none;
      color: var(--text-primary);
      padding: 10px 16px;
      border-radius: 10px;
      text-align: left;
      font-size: 0.9rem;
    }
    .context-popup button:hover { background: var(--accent); color:#000; }

    .modal-dialog {
      position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 24px; width: 300px; z-index:30;
      text-align:center; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .modal-dialog input, .modal-dialog select {
      width:100%; margin:8px 0; padding:10px; border-radius:30px;
      border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05);
      color:#fff; outline:none; font-size:0.9rem;
    }
    .glass-btn {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-primary); padding: 10px 16px; border-radius: 30px;
      cursor: pointer; font-weight:500; font-size:0.85rem; transition:0.2s; margin:4px;
    }
    .glass-btn:hover { background: var(--accent); border-color: var(--accent); color:#000; }
    .glass-btn.danger { border-color: #f7768e; color: #f7768e; }
    .glass-btn.danger:hover { background: #f7768e; color:#fff; }

    #chatScreen { display:flex; flex-direction:column; }
    .chat-header {
      display:flex; align-items:center; padding:12px 10px;
      margin: 72px 10px 0; /* опущена в два раза ниже (было 36px) */
      border-radius: var(--radius) var(--radius) 0 0;
      gap:8px;
    }
    .chat-avatar { display:none; }
    .back-btn { display:none; }
    .chat-header .chat-info { flex:1; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .chat-name { font-weight:600; font-size:1.1rem; display: flex; align-items: center; gap: 6px; }
    .chat-id { font-size:0.75rem; color: var(--text-secondary); }
    .typing-hint { padding: 2px 14px; font-size: 0.8rem; color: var(--accent); font-style: italic; }
    .messages-area { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
    .message-line { padding:6px 0; font-size:0.95rem; line-height:1.4; user-select: text; }
    .message-line .time { color: var(--text-secondary); margin-right:6px; }
    .message-line .sender { font-weight:600; margin-right:6px; color: var(--accent); cursor:pointer; }
    .message-line .sender:hover { text-decoration: underline; }
    .input-area {
      display:flex; padding:10px 10px; border-top: 1px solid var(--glass-border);
      align-items:center; gap:8px;
    }
    .input-area .back-btn-chat {
      background: transparent; border: none; color: var(--accent);
      font-size: 1.5rem; cursor: pointer; padding: 0 6px;
    }
    .input-area input[type="text"] {
      flex:1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      border-radius:30px; padding:12px 16px; color:#fff; outline:none; font-size:0.95rem;
    }
    .input-area button {
      background: var(--accent); border:none; border-radius:50%; width:42px; height:42px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      box-shadow: 0 0 8px rgba(122,162,247,0.3);
      flex-shrink: 0; /* запрещаем сжатие */
    }
    #fileInput { display: none; }
    @media (max-width: 500px) { .phone-frame { max-height: 100%; border-radius: 0; } }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="app-bg"></div>

  <!-- Главный экран -->
  <div id="mainScreen" class="screen hidden">
    <div class="header glass-panel">
      <span class="logo">Криста 5</span>
      <button class="icon-btn" id="searchBtn">🔍</button>
      <button class="icon-btn" id="createBtn">✏️</button>
      <button class="icon-btn" id="openSettingsBtn">⚙️</button>
      <div class="create-menu hidden" id="createMenu">
        <button id="createChatOption">📌 Создать чат</button>
        <button id="createChannelOption">📢 Создать канал</button>
      </div>
    </div>
    <div class="list-container" id="contactList"></div>
  </div>

  <!-- Экран чата -->
  <div id="chatScreen" class="screen hidden">
    <div class="chat-header glass-panel">
      <div class="chat-info" id="chatInfo">
        <div class="chat-name" id="chatNameDisplay"></div>
        <div class="chat-id" id="chatIdDisplay"></div>
      </div>
      <button class="icon-btn" id="downloadChatBtn">⬇️</button>
    </div>
    <div class="typing-hint hidden" id="typingHint">печатает...</div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
      <button class="back-btn-chat" id="backFromChat">←</button>
      <input type="text" placeholder="Сообщение..." id="messageInput">
      <button id="attachBtn">📎</button>
      <button id="sendMessageBtn">➤</button>
    </div>
    <input type="file" id="fileInput" multiple>
  </div>

  <!-- Контекстное меню для копирования -->
  <div class="context-popup hidden" id="copyMenu">
    <button id="copyTextBtn">📋 Копировать текст</button>
  </div>

  <!-- Модальные окна -->
  <div class="modal-dialog hidden" id="searchDialog">
    <h3>Поиск</h3>
    <input type="text" placeholder="Введите ID чата или пользователя" id="searchInputField">
    <button class="glass-btn" id="confirmSearch">Найти</button>
    <button class="glass-btn" id="cancelSearch">Отмена</button>
  </div>
  <div class="modal-dialog hidden" id="createRoomDialog">
    <h3 id="createRoomTitle"></h3>
    <input type="text" placeholder="Название" id="newRoomName">
    <button class="glass-btn" id="confirmCreateRoom">Создать</button>
    <button class="glass-btn" id="cancelCreateRoom">Отмена</button>
  </div>
  <div class="modal-dialog hidden" id="settingsDialog">
    <h3>Настройки</h3>
    <div style="margin:10px 0"><strong>Ваш ID:</strong> <span id="settingsUserId"></span></div>
    <input type="text" id="setNick" placeholder="Ник">
    <input type="text" id="setDesc" placeholder="Описание">
    <button class="glass-btn" id="saveSettings">Сохранить</button>
    <button class="glass-btn danger" id="logoutBtn">🚪 Выйти из аккаунта</button>
    <button class="glass-btn" id="closeSettings">Отмена</button>
  </div>
  <div class="modal-dialog hidden" id="userProfileDialog">
    <div id="userProfileContent"></div>
    <button class="glass-btn" id="closeProfile">Закрыть</button>
  </div>

  <!-- Авторизация -->
  <div class="modal-dialog" id="authDialog">
    <h3 id="authTitle">Вход</h3>
    <input type="text" placeholder="Ваш ID" id="authLogin">
    <input type="password" placeholder="Пароль" id="authPassword">
    <div id="registerNickField" class="hidden">
      <input type="text" id="authNick" placeholder="Никнейм">
    </div>
    <button class="glass-btn" id="authSubmitBtn">Войти</button>
    <button class="glass-btn" id="toggleAuthMode">Регистрация</button>
    <div id="authError" style="color:var(--danger); margin-top:8px;"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ================== РЕГИСТРАЦИЯ SERVICE WORKER ==================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        console.log('SW зарегистрирован:', reg.scope);
        if ('periodicSync' in reg) {
          reg.periodicSync.register('check-updates', { minInterval: 12 * 60 * 60 * 1000 }).catch(()=>{});
        }
      })
      .catch(err => console.log('Ошибка регистрации SW:', err));
  });
}

// ================== ИНИЦИАЛИЗАЦИЯ ==================
const socket = io();
let currentUser = null;
let currentRoomId = null;
let currentMessages = [];
let mainListData = { onlineContacts: [], offlineContacts: [], rooms: [] };

const mainScreen = document.getElementById('mainScreen');
const chatScreen = document.getElementById('chatScreen');
const contactList = document.getElementById('contactList');
const messagesArea = document.getElementById('messagesArea');
const chatNameDisplay = document.getElementById('chatNameDisplay');
const chatIdDisplay = document.getElementById('chatIdDisplay');
const messageInput = document.getElementById('messageInput');
const typingHint = document.getElementById('typingHint');
const createMenu = document.getElementById('createMenu');
const authDialog = document.getElementById('authDialog');
const authTitle = document.getElementById('authTitle');
const authLogin = document.getElementById('authLogin');
const authPassword = document.getElementById('authPassword');
const authNick = document.getElementById('authNick');
const registerNickField = document.getElementById('registerNickField');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const toggleAuthModeBtn = document.getElementById('toggleAuthMode');
const authError = document.getElementById('authError');
const searchDialog = document.getElementById('searchDialog');
const searchInputField = document.getElementById('searchInputField');
const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const downloadChatBtn = document.getElementById('downloadChatBtn');
const copyMenu = document.getElementById('copyMenu');

let authMode = 'login';
let longPressTimer = null;
let selectedCopyText = '';

// ================== АВТОРИЗАЦИЯ ==================
const savedToken = localStorage.getItem('k4_token');
if (savedToken) {
  authDialog.classList.add('hidden');
  socket.emit('loginByToken', savedToken);
} else {
  authDialog.classList.remove('hidden');
}

function setAuthMode(mode) {
  authMode = mode;
  if (mode === 'login') {
    authTitle.textContent = 'Вход';
    authSubmitBtn.textContent = 'Войти';
    toggleAuthModeBtn.textContent = 'Регистрация';
    authLogin.style.display = '';
    registerNickField.classList.add('hidden');
  } else {
    authTitle.textContent = 'Регистрация';
    authSubmitBtn.textContent = 'Создать аккаунт';
    toggleAuthModeBtn.textContent = 'Вход';
    authLogin.style.display = 'none';
    registerNickField.classList.remove('hidden');
  }
}

toggleAuthModeBtn.addEventListener('click', () => setAuthMode(authMode === 'login' ? 'register' : 'login'));

authSubmitBtn.addEventListener('click', () => {
  const password = authPassword.value;
  const nick = authNick.value.trim();
  authError.textContent = '';
  if (!password) { authError.textContent = 'Введите пароль'; return; }
  if (authMode === 'register') {
    socket.emit('register', { password, nick });
  } else {
    const login = authLogin.value.trim();
    if (!login) { authError.textContent = 'Введите ID'; return; }
    socket.emit('login', { login, password });
  }
});

socket.on('authError', (msg) => { authError.textContent = msg; });

socket.on('authSuccess', (profile) => {
  currentUser = profile;
  localStorage.setItem('k4_token', profile.token);
  authDialog.classList.add('hidden');
  mainScreen.classList.remove('hidden');
  if (authMode === 'register') {
    alert(`Регистрация успешна! Ваш ID: ${profile.id}. Запомните его для входа с других устройств.`);
  }
  refreshMainList();
});

socket.on('tokenLoginResult', (res) => {
  if (res.success) {
    currentUser = res.profile;
    authDialog.classList.add('hidden');
    mainScreen.classList.remove('hidden');
    refreshMainList();
  } else {
    localStorage.removeItem('k4_token');
    authDialog.classList.remove('hidden');
  }
});

// ================== ГЛАВНЫЙ ЭКРАН ==================
function refreshMainList() { socket.emit('getMainList'); }
socket.on('mainList', (data) => {
  mainListData = data;
  renderContactList();
});

function renderContactList() {
  let html = '';
  html += `<div class="list-section"><div class="section-title">Общий чат</div>
    <div class="room-item" data-chat="Общий чат" data-id="general">
      <div class="avatar">#</div>
      <div class="info"><span class="nick">Общий чат</span><span class="user-id">[general]</span></div></div></div>`;

  if (mainListData.rooms.length) {
    html += '<div class="list-section"><div class="section-title">Чаты и каналы</div>';
    mainListData.rooms.forEach(r => {
      const typeIcon = r.type === 'channel' ? '📢' : '#';
      html += `<div class="room-item" data-chat="${r.name}" data-id="${r.id}" data-creator="${r.creator}">
        <div class="avatar">${typeIcon}</div>
        <div class="info"><span class="nick">${r.name}</span><span class="user-id">[${r.id}]</span></div>
        <button class="delete-btn" data-id="${r.id}">🗑️</button></div>`;
    });
    html += '</div>';
  }

  if (mainListData.onlineContacts.length) {
    html += '<div class="list-section"><div class="section-title">В сети</div>';
    mainListData.onlineContacts.forEach(c => {
      html += `<div class="contact-item" data-chat="${c.nick}" data-id="${c.id}">
        <div class="avatar">${(c.nick[0]||'').toUpperCase()}</div>
        <div class="info"><span class="nick">${c.nick}</span><span class="user-id">${c.id}</span></div>
        <div class="status-dot online"></div></div>`;
    });
    html += '</div>';
  }
  if (mainListData.offlineContacts.length) {
    html += '<div class="list-section"><div class="section-title">Не в сети</div>';
    mainListData.offlineContacts.forEach(c => {
      html += `<div class="contact-item" data-chat="${c.nick}" data-id="${c.id}">
        <div class="avatar">${(c.nick[0]||'').toUpperCase()}</div>
        <div class="info"><span class="nick">${c.nick}</span><span class="user-id">${c.id}</span></div>
        <div class="status-dot offline"></div></div>`;
    });
    html += '</div>';
  }
  contactList.innerHTML = html;
  attachChatListeners();
  attachDeleteListeners();
}

function attachChatListeners() {
  document.querySelectorAll('.contact-item, .room-item').forEach(el => {
    el.removeEventListener('click', openChatHandler);
    el.addEventListener('click', openChatHandler);
  });
}

function openChatHandler(e) {
  if (e.target.classList.contains('delete-btn')) return;
  const name = e.currentTarget.dataset.chat;
  const id = e.currentTarget.dataset.id;
  openChat(name, id);
}

function openChat(name, id) {
  chatNameDisplay.textContent = name;
  chatIdDisplay.textContent = id;
  messagesArea.innerHTML = '';
  currentRoomId = id;
  socket.emit('joinRoom', id);
  mainScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  messageInput.focus();
}

function attachDeleteListeners() {
  document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const roomId = btn.dataset.id;
      if (confirm('Удалить эту комнату/канал?')) {
        socket.emit('deleteRoom', roomId);
      }
    });
  });
}

socket.on('roomDeleted', (roomId) => {
  refreshMainList();
  if (currentRoomId === roomId) {
    chatScreen.classList.add('hidden');
    mainScreen.classList.remove('hidden');
  }
});

// ================== ПОИСК ==================
document.getElementById('searchBtn').addEventListener('click', () => {
  searchInputField.value = '';
  searchDialog.classList.remove('hidden');
});
document.getElementById('cancelSearch').addEventListener('click', () => searchDialog.classList.add('hidden'));
document.getElementById('confirmSearch').addEventListener('click', () => {
  const id = searchInputField.value.trim();
  if (!id) return;
  socket.emit('globalSearch', { query: id });
  searchDialog.classList.add('hidden');
});

socket.on('globalSearchResult', (result) => {
  if (result.type === 'room') {
    openChat(result.name, result.id);
  } else if (result.type === 'user') {
    socket.emit('startPrivateChat', result.id);
  } else {
    alert('Ничего не найдено');
  }
});

// ================== ЛИЧНЫЕ ЧАТЫ ==================
socket.on('privateRoomReady', ({ roomId, targetId, targetNick }) => {
  openChat(targetNick, roomId);
});

// ================== ОТПРАВКА СООБЩЕНИЙ ==================
document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || !currentRoomId) return;
  socket.emit('chatMessage', { roomId: currentRoomId, text });
  messageInput.value = '';
  socket.emit('stopTyping', { roomId: currentRoomId });
  typingHint.classList.add('hidden');
}

let typingTimer;
socket.on('typing', (data) => {
  if (data.userId !== currentUser?.id) {
    typingHint.textContent = `${data.nick} печатает...`;
    typingHint.classList.remove('hidden');
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => typingHint.classList.add('hidden'), 2000);
  }
});
socket.on('stopTyping', (data) => {
  if (data.userId !== currentUser?.id) typingHint.classList.add('hidden');
});

messageInput.addEventListener('input', () => {
  if (!currentRoomId) return;
  if (messageInput.value.trim().length > 0) socket.emit('typing', { roomId: currentRoomId });
  else socket.emit('stopTyping', { roomId: currentRoomId });
});

// ================== СКАЧИВАНИЕ ЧАТА TXT ==================
downloadChatBtn.addEventListener('click', () => {
  if (!currentMessages.length) return alert('Нет сообщений для скачивания');
  const BOM = '\uFEFF';
  let text = BOM + `Чат: ${chatNameDisplay.textContent} (${chatIdDisplay.textContent})\n\n`;
  currentMessages.forEach(msg => {
    text += `[${msg.time}] ${msg.user}: ${msg.text}\n`;
  });
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chat_${currentRoomId}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});

// ================== КОПИРОВАНИЕ ТЕКСТА (долгое нажатие на сообщение) ==================
let copyTarget = null;
messagesArea.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const line = e.target.closest('.message-line');
  if (!line) return;
  const text = line.querySelector('.text')?.textContent || '';
  selectedCopyText = text;
  copyMenu.style.left = e.clientX + 'px';
  copyMenu.style.top = e.clientY + 'px';
  copyMenu.classList.remove('hidden');
});

messagesArea.addEventListener('touchstart', (e) => {
  copyTarget = e.target.closest('.message-line');
  if (!copyTarget) return;
  longPressTimer = setTimeout(() => {
    const text = copyTarget.querySelector('.text')?.textContent || '';
    selectedCopyText = text;
    const touch = e.touches[0];
    copyMenu.style.left = touch.clientX + 'px';
    copyMenu.style.top = touch.clientY + 'px';
    copyMenu.classList.remove('hidden');
  }, 600);
});
messagesArea.addEventListener('touchend', () => clearTimeout(longPressTimer));
messagesArea.addEventListener('touchmove', () => clearTimeout(longPressTimer));

document.getElementById('copyTextBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(selectedCopyText).then(() => {
    copyMenu.classList.add('hidden');
  });
});
document.addEventListener('click', (e) => {
  if (!copyMenu.contains(e.target)) copyMenu.classList.add('hidden');
});

// ================== ИНДИКАТОР ОНЛАЙН В ШАПКЕ ==================
socket.on('roomInfo', (info) => {
  currentMessages = info.messages || [];
  renderMessages();

  let onlineDot = '';
  if (currentRoomId && !currentRoomId.startsWith('6') && currentRoomId !== 'general') {
    const participant = info.participants?.find(p => p.id !== currentUser?.id);
    if (participant) {
      onlineDot = `<span style="width:8px;height:8px;border-radius:50%;background:${participant.online ? '#9ece6a' : '#555'};display:inline-block;margin-left:6px;box-shadow: 0 0 6px ${participant.online ? '#9ece6a' : 'transparent'}"></span>`;
    }
  }
  // Обновляем имя с точкой
  chatNameDisplay.innerHTML = (chatNameDisplay.textContent || info.name) + onlineDot;
});

socket.on('newMessage', (msg) => {
  currentMessages.push(msg);
  appendMessage(msg);
  messagesArea.scrollTop = messagesArea.scrollHeight;
});

function renderMessages() {
  messagesArea.innerHTML = '';
  currentMessages.forEach(appendMessage);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function appendMessage(msg) {
  const div = document.createElement('div');
  div.className = 'message-line';
  div.innerHTML = `<span class="time">${msg.time}.</span><span class="sender" style="color:${msg.color||'#7aa2f7'}" data-user-id="${msg.userId}">${msg.user}:</span> <span class="text">${msg.text}</span>`;
  messagesArea.appendChild(div);
}

// ================== ВОЗВРАТ ==================
document.getElementById('backFromChat').addEventListener('click', () => {
  socket.emit('leaveRoom', currentRoomId);
  chatScreen.classList.add('hidden');
  mainScreen.classList.remove('hidden');
  refreshMainList();
});

// ================== МЕНЮ СОЗДАНИЯ ==================
document.getElementById('createBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  createMenu.classList.toggle('hidden');
});
document.addEventListener('click', (e) => {
  if (!createMenu.contains(e.target)) createMenu.classList.add('hidden');
});
document.getElementById('createChatOption').addEventListener('click', () => {
  createMenu.classList.add('hidden');
  openCreateRoomDialog('chat');
});
document.getElementById('createChannelOption').addEventListener('click', () => {
  createMenu.classList.add('hidden');
  openCreateRoomDialog('channel');
});
function openCreateRoomDialog(type) {
  document.getElementById('createRoomTitle').textContent = type === 'chat' ? 'Создать чат' : 'Создать канал';
  document.getElementById('createRoomDialog').classList.remove('hidden');
  document.getElementById('newRoomName').value = '';
  document.getElementById('confirmCreateRoom').onclick = () => {
    const name = document.getElementById('newRoomName').value.trim();
    if (!name) return;
    socket.emit('createRoom', { name, type });
    document.getElementById('createRoomDialog').classList.add('hidden');
  };
}
document.getElementById('cancelCreateRoom').addEventListener('click', () => {
  document.getElementById('createRoomDialog').classList.add('hidden');
});

// ================== НАСТРОЙКИ ==================
document.getElementById('openSettingsBtn').addEventListener('click', () => {
  document.getElementById('settingsUserId').textContent = currentUser?.id || '';
  document.getElementById('setNick').value = currentUser?.nick || '';
  document.getElementById('setDesc').value = currentUser?.description || '';
  document.getElementById('settingsDialog').classList.remove('hidden');
});
document.getElementById('closeSettings').addEventListener('click', () => {
  document.getElementById('settingsDialog').classList.add('hidden');
});
document.getElementById('saveSettings').addEventListener('click', () => {
  const nick = document.getElementById('setNick').value.trim();
  const desc = document.getElementById('setDesc').value.trim();
  socket.emit('updateProfile', { nick, description: desc });
  document.getElementById('settingsDialog').classList.add('hidden');
});
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('k4_token');
  location.reload();
});

// ================== ПРОФИЛЬ ==================
document.getElementById('chatInfo').addEventListener('click', () => {
  socket.emit('getUserProfile', currentRoomId);
});
socket.on('userProfile', (profile) => {
  document.getElementById('userProfileContent').innerHTML = `
    <h3>${profile.nick}</h3><p>${profile.description||''}</p>
    <p style="color:var(--text-secondary);">Последний вход: ${new Date(profile.lastSeen).toLocaleString()}</p>
  `;
  document.getElementById('userProfileDialog').classList.remove('hidden');
});
document.getElementById('closeProfile').addEventListener('click', () => {
  document.getElementById('userProfileDialog').classList.add('hidden');
});

socket.on('contactsUpdated', () => refreshMainList());
socket.on('roomCreated', () => refreshMainList());

if (savedToken) socket.emit('loginByToken', savedToken);
</script>
</body>
</html>
